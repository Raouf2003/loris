services:
  - type: web
    name: kiosk-api
    env: python
    region: frankfurt
    plan: free
    buildCommand: >-
      pip install -r requirements.txt &&
      python -c "from insightface.app import FaceAnalysis; FaceAnalysis(name='buffalo_l', root='./insightface_models', providers=['CPUExecutionProvider']).prepare(ctx_id=-1, det_size=(640, 640))"
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: FACE_THRESHOLD
        value: "0.85"
